name: Release
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false
on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE: ${{ github.repository }}
  VERSION: "0.0.1"
  OTELCOL_VERSION: "0.156.0"
  ALPINE_VERSION: "0.156.0"

jobs:
  docker_build_push:
    name: OtelCol Build and push Docker image
    runs-on: ubuntu-latest
    timeout-minutes: 300
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0
      # Enable containerd image store to allow loading manifest lists to the daemon
      - name: Enable containerd image store
        shell: bash
        run: |
          echo '{"features": {"containerd-snapshotter": true}}' | sudo tee /etc/docker/daemon.json
          sudo systemctl restart docker
      - name: Log in to the Container registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE }}
      - name: Build and push Docker image
        id: build_push
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          file: cmd/otelcontribcol/Dockerfile
          platforms: |
            linux/amd64
            linux/arm64
          tags: "${{ env.REGISTRY }}/${{ env.IMAGE }}:${{ env.VERSION }}-${{ env.VERSION }}-${{ env.ALPINE_VERSION }}"
          target: runner
          context: ./
          cache-from: type=gha
          cache-to: type=gha,mode=max
          push: true
          provenance: mode=max
          sbom: true
          labels: ${{ steps.meta.outputs.labels }}
      - name: Generate artifact attestation
        uses: actions/attest@f7c74d28b9d84cb8768d0b8ca14a4bac6ef463e6 # v4.2.0
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE }}
          subject-digest: ${{ steps.build_push.outputs.digest }}
          push-to-registry: true

  obi_docker_build_push:
    name: OtelCol OBI Build and push Docker image
    runs-on: ubuntu-latest
    timeout-minutes: 300
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0
      # Enable containerd image store to allow loading manifest lists to the daemon
      - name: Enable containerd image store
        shell: bash
        run: |
          echo '{"features": {"containerd-snapshotter": true}}' | sudo tee /etc/docker/daemon.json
          sudo systemctl restart docker
      - name: Log in to the Container registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE }}
      - name: Build and push Docker image
        id: build_push
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          file: cmd/otelcontribcol-obi/Dockerfile
          platforms: |
            linux/amd64
            linux/arm64
          tags: "${{ env.REGISTRY }}/${{ env.IMAGE }}:${{ env.VERSION }}-obi-${{ env.VERSION }}"
          target: runner
          context: ./
          cache-from: type=gha
          cache-to: type=gha,mode=max
          push: true
          provenance: mode=max
          sbom: true
          labels: ${{ steps.meta.outputs.labels }}
      - name: Generate artifact attestation
        uses: actions/attest@f7c74d28b9d84cb8768d0b8ca14a4bac6ef463e6 # v4.2.0
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE }}
          subject-digest: ${{ steps.build_push.outputs.digest }}
          push-to-registry: true
